<!--
============================================================================
UnityAssetsManager - templates/base.html
============================================================================
Description: Base layout template (navigation, assets, scripts).
Version: 1.2.9
============================================================================
-->
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraBloom UnityAssetsManager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />

    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="/"> <span class="badge bg-success">UAM</span> UnityAssetsManager </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#" id="navReload" title="Recharger les données"> 🔄 Recharger </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" id="navStats" title="Afficher les statistiques"> 📊 Stats </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Container principal -->
    <div class="container-fluid py-4">{% block content %}{% endblock %}</div>

    <!-- Footer -->
    <footer class="bg-light text-center py-3 mt-5 border-top">
      <div class="container-fluid">
        <small class="text-muted">
          UnityAssetsManager Flask •
          <span id="dataInfo">Chargement...</span>
        </small>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
