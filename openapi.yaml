openapi: 3.0.3
info:
  title: UnityAssetsManager API
  version: 1.2.5
  description: API locale pour explorer et exporter des assets Unity (CSV/SQLite). Le port HTTP par défaut est 5003 et peut être modifié dans config/config.json.
servers:
  - url: http://localhost:5003
paths:
  /api/data:
    get:
      summary: Liste paginée des données assets
      parameters:
        - in: query
          name: draw
          schema:
            type: integer
        - in: query
          name: start
          schema:
            type: integer
        - in: query
          name: length
          schema:
            type: integer
        - in: query
          name: search[value]
          schema:
            type: string
        - in: query
          name: search[regex]
          schema:
            type: boolean
      responses:
        '200':
          description: Données paginées
          content:
            application/json:
              schema:
                type: object
                properties:
                  draw:
                    type: integer
                  recordsTotal:
                    type: integer
                  recordsFiltered:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
  /api/columns:
    get:
      summary: Liste des colonnes disponibles
      responses:
        '200':
          description: Colonnes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/templates:
    get:
      summary: Liste des templates d'export
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        pattern:
                          type: string
  /api/profiles:
    get:
      summary: Liste des profils
      responses:
        '200':
          description: Profils
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    post:
      summary: Sauvegarder un profil
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileSaveRequest'
      responses:
        '200':
          description: Profil sauvegardé
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Erreur interne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /api/profiles/{name}:
    get:
      summary: Charger un profil
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profil
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Profil absent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    delete:
      summary: Supprimer un profil
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profil supprimé
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '404':
          description: Profil absent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /api/export:
    post:
      summary: Exporter les données filtrées
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Fichier exporté (binaire)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Erreur de requête ou de template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Erreur export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /api/batch-export:
    post:
      summary: Exporter les données en mode headless vers un fichier local
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchExportRequest'
      responses:
        '200':
          description: Export batch écrit sur disque
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  path:
                    type: string
                  filename:
                    type: string
                  rows:
                    type: integer
                  columns:
                    type: integer
                  template:
                    type: string
                  bytes:
                    type: integer
        '400':
          description: Requête batch invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Erreur de batch export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /api/reload:
    post:
      summary: Recharger les données depuis la source
      responses:
        '200':
          description: Rechargement effectué
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
  /api/stats:
    get:
      summary: Statistiques sur la source courante
      responses:
        '200':
          description: Statistiques
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Aucune donnee chargee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /api/setup:
    post:
      summary: Configurer la source de données
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '200':
          description: Configuration appliquée
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '400':
          description: Paramètres de configuration invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Erreur de configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /api/test-path:
    post:
      summary: Vérifier un chemin source CSV/SQLite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
      responses:
        '200':
          description: Resultat du test
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  type:
                    type: string
                  rows:
                    type: integer
                  cols:
                    type: integer
                  tables:
                    type: array
                    items:
                      type: string
                  error:
                    type: string
components:
  schemas:
    ApiErrorEnvelope:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
      required:
        - error
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        http_status:
          type: integer
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - code
        - message
        - http_status
        - timestamp
        - path
        - details
    SetupRequest:
      type: object
      properties:
        data_path:
          type: string
        db_table:
          type: string
      required:
        - data_path
    ProfileSaveRequest:
      type: object
      properties:
        name:
          type: string
        columns:
          type: array
          items:
            type: string
        filter_columns:
          type: array
          items:
            type: string
        filter_stack:
          type: array
          items:
            type: object
      required:
        - name
    ExportRequest:
      type: object
      properties:
        template:
          type: string
        columns:
          type: array
          items:
            type: string
        search:
          type: string
        filter_columns:
          type: array
          items:
            type: string
        filter_stack:
          type: array
          items:
            type: object
        alias_map:
          type: object
          additionalProperties:
            type: string
    BatchExportRequest:
      allOf:
        - $ref: '#/components/schemas/ExportRequest'
        - type: object
          properties:
            output_dir:
              type: string
            file_name:
              type: string
